name: Deploy to itch.io

on:
  push:
    branches:
      - master
    # Or use tags instead:
    # tags:
    #   - "v*"

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Avoid Yarn/Corepack on the runner (global Yarn 1 conflicts with packageManager).
      # npm is enough here — we only need a production webpack build.
      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          # itch.io hosts static files only — connect to the live Deno game server
          WS_URL: wss://tiny-land.diguifi.deno.net/ws
        run: npm run build

      - name: Install Butler
        working-directory: .
        run: |
          curl -L https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default -o butler.zip
          unzip butler.zip
          chmod +x butler
          sudo mv butler /usr/local/bin/

      - name: Deploy to itch.io
        working-directory: .
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          butler push client/public diguifi/tiny-land:html5 \
            --userversion "${{ github.sha }}"
